<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rent Hub - Your premium rental services management platform. Access admin, employee, or user portals.">
    <title>Rent Hub — Premium Rental Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="auth-body">
    <div class="auth-container" id="main-container">
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">Rent Hub</div>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="auth-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="auth_user" placeholder="Enter your username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" name="auth_pass" placeholder="Enter your password" required autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; border: none; background: #6366f1; color: white; cursor: pointer; transition: background 0.3s; margin-top: 10px;">Sign In</button>
            <div style="margin-top: 20px; text-align: center; color: #64748b; font-size: 0.9rem;">
                <a href="{{ url_for('user') }}?register=true" style="color: #6366f1; text-decoration: none; font-weight: 500;">Register as User</a>
                &bull;
                <a href="{{ url_for('employee') }}?register=true" style="color: #6366f1; text-decoration: none; font-weight: 500;">Register as Employee</a>
            </div>
        </form>
    </div>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
