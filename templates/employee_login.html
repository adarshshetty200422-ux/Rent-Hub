<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Employee login and registration portal for Rent Hub workplace services.">
    <title>Employee Portal — Rent Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">👷</div>
            <div class="logo-text">Rent Hub</div>
        </div>

        <h2 id="formTitle">Employee Authentication</h2>
        <p class="subtitle" id="formSubtitle">Sign in to your employee portal</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form id="authForm" method="POST" action="{{ url_for('employee') }}" autocomplete="off" class="auth-form" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Name</label>
                <input type="text" id="username" name="emp_user" placeholder="Enter your name" required autocomplete="off">
            </div>

            <div id="registerFields" style="display: none;">
                <div class="form-group" style="margin-bottom: 14px;">
                    <label for="gmail">Gmail ID</label>
                    <input type="email" id="gmail" name="gmail" placeholder="Enter Gmail ID">
                </div>

                <div class="form-group">
                    <label>Work Details</label>
                    <div class="checkbox-group" id="work_details_container" style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Moving / Shifting Service"> Moving / Shifting Service
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Cleaning Service"> Cleaning Service
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Plumbing"> Plumber
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Electrician"> Electrician
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Catering"> Catering Services
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" name="work_details" value="Furniture Rental Service"> Furniture Rental Service
                        </label>
                        <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600;">
                            <input type="checkbox" id="master_appliance_checkbox" onchange="document.getElementById('appliance_sub_options').style.display = this.checked ? 'grid' : 'none'; if(!this.checked) { document.querySelectorAll('#appliance_sub_options input').forEach(cb => cb.checked = false); }"> Appliance Repair
                        </label>
                        <div id="appliance_sub_options" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-left: 15px; border-left: 2px solid var(--border); padding-left: 15px;">
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="checkbox" name="work_details" value="Appliance Service: AC Repair"> AC Repair</label>
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="checkbox" name="work_details" value="Appliance Service: Washing Machine Repair"> Washing Machine Repair</label>
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="checkbox" name="work_details" value="Appliance Service: Refrigerator Repair"> Refrigerator Repair</label>
                            <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;"><input type="checkbox" name="work_details" value="Appliance Service: TV Repair"> TV Repair</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group" id="passwordField">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" name="emp_pass" placeholder="Enter your password" required autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="forgotPasswordContainer" style="text-align: right; margin-bottom: 15px; margin-top: -10px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary); font-size: 0.85em; text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-toggle">
            <button type="button" onclick="handleToggleClick()" id="toggleBtn">Don't have an account? Register here</button>
        </div>



        <div style="text-align: center;">
            <a href="{{ url_for('index') }}" class="back-link">← Return to Home</a>
        </div>
    </div>

    <script>
        let isLogin = true;

        function handleToggleClick() {
            if (isLogin) {
                toggleForm();
            } else {
                window.location.href = "{{ url_for('index') }}";
            }
        }

        function toggleForm() {
            isLogin = !isLogin;
            const formTitle = document.getElementById("formTitle");
            const formSubtitle = document.getElementById("formSubtitle");
            const toggleBtn = document.getElementById("toggleBtn");
            const authForm = document.getElementById("authForm");
            const submitBtn = document.getElementById("submitBtn");
            const registerFields = document.getElementById("registerFields");
            const gmailInput = document.getElementById("gmail");
            const passwordField = document.getElementById("passwordField");
            const passwordInput = document.getElementById("password");

            if (isLogin) {
                formTitle.innerText = "Employee Authentication";
                formSubtitle.innerText = "Sign in to your employee portal";
                toggleBtn.innerText = "Don't have an account? Register here";
                submitBtn.innerText = "Sign In";
                authForm.action = "{{ url_for('employee') }}";
                registerFields.style.display = "none";
                gmailInput.removeAttribute("required");
                passwordField.style.display = "block";
                passwordInput.setAttribute("required", "required");
                const forgotContainer = document.getElementById("forgotPasswordContainer");
                if(forgotContainer) forgotContainer.style.display = "block";
            } else {
                formTitle.innerText = "Employee Registration";
                formSubtitle.innerText = "Register to offer your services";
                toggleBtn.innerText = "Already have an account? Sign in";
                submitBtn.innerText = "Register";
                authForm.action = "{{ url_for('register_employee') }}";
                registerFields.style.display = "block";
                gmailInput.setAttribute("required", "required");
                passwordField.style.display = "none";
                passwordInput.removeAttribute("required");
                const forgotContainer = document.getElementById("forgotPasswordContainer");
                if(forgotContainer) forgotContainer.style.display = "none";
            }

            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            gmailInput.value = "";
            document.querySelectorAll('input[name="work_details"]').forEach(cb => cb.checked = false);
            
            const masterCb = document.getElementById("master_appliance_checkbox");
            if (masterCb) {
                masterCb.checked = false;
                document.getElementById('appliance_sub_options').style.display = 'none';
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        window.addEventListener('DOMContentLoaded', (event) => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('register') === 'true') {
                toggleForm();
            }
        });
    </script>
</body>

</html>
