<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User login and registration portal for Rent Hub rental services.">
    <title>User Login — Rent Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">👤</div>
            <div class="logo-text">Rent Hub</div>
        </div>

        <h2 id="formTitle">User Authentication</h2>
        <p class="subtitle" id="formSubtitle">Sign in to access your rental dashboard</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form id="authForm" method="POST" action="{{ url_for('user') }}" autocomplete="off" class="auth-form" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="usr_user" placeholder="Enter your username" required autocomplete="off">
            </div>

            <div id="registerFields" style="display: none;">
                <div class="form-group" style="margin-bottom: 14px;">
                    <label for="gmail">Gmail ID</label>
                    <input type="email" id="gmail" name="gmail" placeholder="Enter Gmail ID">
                </div>

            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" name="usr_pass" placeholder="Enter your password" required autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="forgotPasswordContainer" style="text-align: right; margin-bottom: 15px; margin-top: -10px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary); font-size: 0.85em; text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-toggle">
            <button type="button" onclick="handleToggleClick()" id="toggleBtn">Don't have an account? Register here</button>
        </div>

        <div style="text-align: center;">
            <a href="{{ url_for('index') }}" class="back-link">← Return to Home</a>
        </div>
    </div>

    <script>
        let isLogin = true;

        function handleToggleClick() {
            if (isLogin) {
                toggleForm();
            } else {
                window.location.href = "{{ url_for('index') }}";
            }
        }

        function toggleForm() {
            isLogin = !isLogin;
            const formTitle = document.getElementById("formTitle");
            const formSubtitle = document.getElementById("formSubtitle");
            const toggleBtn = document.getElementById("toggleBtn");
            const authForm = document.getElementById("authForm");
            const submitBtn = document.getElementById("submitBtn");
            const registerFields = document.getElementById("registerFields");
            const gmailInput = document.getElementById("gmail");

            if (isLogin) {
                formTitle.innerText = "User Authentication";
                formSubtitle.innerText = "Sign in to access your rental dashboard";
                toggleBtn.innerText = "Don't have an account? Register here";
                submitBtn.innerText = "Sign In";
                authForm.action = "{{ url_for('user') }}";
                if(registerFields) registerFields.style.display = "none";
                if(gmailInput) gmailInput.removeAttribute("required");
                const forgotContainer = document.getElementById("forgotPasswordContainer");
                if(forgotContainer) forgotContainer.style.display = "block";
            } else {
                formTitle.innerText = "Create Account";
                formSubtitle.innerText = "Register to start using Rent Hub";
                toggleBtn.innerText = "Already have an account? Sign in";
                submitBtn.innerText = "Create Account";
                authForm.action = "{{ url_for('register_user') }}";
                if(registerFields) registerFields.style.display = "block";
                if(gmailInput) gmailInput.setAttribute("required", "required");
                const forgotContainer = document.getElementById("forgotPasswordContainer");
                if(forgotContainer) forgotContainer.style.display = "none";
            }

            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            if(gmailInput) gmailInput.value = "";
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        window.addEventListener('DOMContentLoaded', (event) => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('register') === 'true') {
                toggleForm();
            }
        });
    </script>
</body>

</html>
