<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login portal for Rent Hub management system.">
    <title>Admin Login — Rent Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <div class="logo-text">Rent Hub</div>
        </div>

        <h2>Admin Authentication</h2>
        <p class="subtitle">Secure access to the admin panel</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off" class="auth-form" id="admin-login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="adm_user">Username</label>
                <input type="text" id="adm_user" name="adm_user" placeholder="Enter admin username" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="adm_pass">Password</label>
                <div class="input-group">
                    <input type="password" id="adm_pass" name="adm_pass" placeholder="Enter password" required autocomplete="new-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div style="text-align: right; margin-bottom: 15px; margin-top: -10px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary); font-size: 0.85em; text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="admin-login-submit">Sign In</button>
        </form>

        <div style="text-align: center;">
            <a href="{{ url_for('index') }}" class="back-link">← Return to Home</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('adm_pass');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>

</html>
